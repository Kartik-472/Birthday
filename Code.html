<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wishes</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f7f7f7;
            margin: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .container:hover {
            transform: scale(1.02);
        }

        h1 {
            color: #e44d26;
        }

        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            margin-top: 10px;
        }

        #friendName {
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Birthday, <span id="friendName">Friend</span>!</h1>
        <p>Bro, another year older, wiser, and cooler! Wishing you a day packed with epic adventures and awesome vibes. May your birthday be as legendary as our friendship. Let the good times roll!</p>
        <p>🎉🎂</p>
    </div>
</body>
</html>
